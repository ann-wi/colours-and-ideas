<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ideas for drawing and Colours</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <h3 class="headerTitle">ideas and colours</h3>
    </header>
    <h1 class="pageTitle">Ideas for drawing and Colours</h1>
    <p class="description">
      Storage of ideas for my art and list of all pretty colours I can use with
      CSS - HEX, RGB, colour names.
    </p>
    <div class="newColour">
      <label for="colourNameInput" class="colourNameLabel">Colour name:</label>
      <input
        placeholder="ex. Pink"
        type="text"
        class="colourNameInput"
        id="colourInput"
      />
      <label for="colourHEXInput" class="colourHEXLabel">Colour in HEX:</label>
      <input
        placeholder="ex. #FFC0CB"
        type="text"
        class="colourHEXInput"
        id="colourHEXInput"
      />
      <button class="addColourBtn" id="addColourBtn">Add Colour</button>
    </div>
    <div class="coloursBox">
      <ul class="colourProps" id="colourProps"></ul>
    </div>
    <footer>
      <p>Anna Vasileva</p>
      <p>2026</p>
    </footer>
    <script src="add-colours-and-ideas.js"></script>
  </body>
</html>
